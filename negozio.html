<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revenix RP | Negozio</title>
    <meta name="description" content="Negozio ufficiale Revenix RP con pacchetti supporter e categorie premium." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <header class="navbar" id="top">
      <div class="container nav-content">
        <a class="logo" href="index.html" aria-label="Homepage Revenix RP">
          <img src="revenix.png" alt="Revenix RP Logo" class="logo-img" />
          <span class="logo-text">Revenix RP</span>
        </a>

        <button class="menu-toggle" aria-label="Apri menu" aria-expanded="false" aria-controls="primary-nav">
          <span></span><span></span><span></span>
        </button>

        <nav id="primary-nav" class="nav" aria-label="Navigazione principale">
          <ul class="nav-links">
            <li><a href="index.html#chi-siamo">Chi siamo</a></li>
            <li><a href="index.html#fazioni">Fazioni</a></li>
            <li><a href="index.html#staff">Staff</a></li>
            <li><a href="regolamento.html">Regolamento</a></li>
          </ul>
        </nav>

        <a class="btn btn-small" href="index.html">Home</a>
      </div>
    </header>

    <main>
      <section class="rules-hero section reveal">
        <div class="hero-overlay"></div>
        <div class="container hero-content">
          <img src="revenix.png" alt="Logo Revenix RP" class="hero-logo" />
          <p class="kicker">Store Ufficiale</p>
          <h1>Negozio Revenix</h1>
          <p class="subtitle">Seleziona una categoria e visualizza i pacchetti disponibili.</p>
        </div>
      </section>

      <section id="negozio" class="section reveal">
        <div class="container">
          <div class="shop-layout">
            <aside class="card shop-sidebar">
              <button class="shop-tab active" data-shop="supporter">Supporter</button>
              <button class="shop-tab" data-shop="veicoli">Veicoli</button>
              <button class="shop-tab" data-shop="casa">Casa</button>
              <button class="shop-tab" data-shop="fazioni">Fazioni</button>
              <button class="shop-tab" data-shop="armi">Armi</button>
              <button class="shop-tab" data-shop="soldi">Soldi</button>
              <button class="shop-tab" data-shop="multi-pg">Multi-PG</button>
              <button class="shop-tab" data-shop="boost">Boost</button>
            </aside>

            <div class="card shop-content">
              <div id="shop-panel" class="shop-panel fade-in"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer-content">
        <p>© 2026 Revenix RP — Tutti i diritti riservati.</p>
        <div class="social-links">
          <a href="https://discord.gg/" target="_blank" rel="noopener noreferrer">Discord</a>
          <a href="https://instagram.com/" target="_blank" rel="noopener noreferrer">Instagram</a>
          <a href="https://youtube.com/" target="_blank" rel="noopener noreferrer">YouTube</a>
          <a href="https://tiktok.com/" target="_blank" rel="noopener noreferrer">TikTok</a>
        </div>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
